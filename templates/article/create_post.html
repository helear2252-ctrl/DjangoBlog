{% extends "base.html" %}

{% block title %}發表新文章 - Django Blog{% endblock %}

{% block extra_css %}
<!-- Quill CSS -->
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
{% endblock %}

{% block content %}
<main class="glass-card" style="width: 90%; max-width: 700px; padding: 3rem 2.5rem; text-align: left;">
    <h2 class="form-title" style="text-align: center;">發表新文章</h2>
    <p class="form-subtitle" style="text-align: center; margin-bottom: 2.5rem;">撰寫並發布您的部落格文章，支援豐富的排版樣式</p>
    
    <form method="post" action="" id="post-form">
        {% csrf_token %}
        
        {% if form.errors %}
            <div class="error-message" style="margin-bottom: 1.5rem; text-align: center;">
                表單內容有誤，請檢查後重試。
            </div>
        {% endif %}
        
        <div class="form-group">
            <label class="form-label" for="id_title">文章標題</label>
            <input type="text" name="title" required id="id_title" class="form-input" placeholder="請輸入文章標題..." maxlength="200">
        </div>
        
        <div class="form-group">
            <label class="form-label" for="id_slug">網址別名 (Slug)</label>
            <input type="text" name="slug" required id="id_slug" class="form-input" placeholder="例如: my-first-post" maxlength="200">
        </div>
        
        <div class="form-group">
            <label class="form-label">文章內容</label>
            <!-- Quill editor container -->
            <div class="editor-container">
                <div id="editor"></div>
            </div>
            <!-- Hidden textarea for django data binding -->
            <textarea name="content" id="hidden_content" style="display:none;"></textarea>
        </div>
        
        <div class="btn-container" style="margin-top: 2.5rem; flex-direction: row; justify-content: space-between; width: 100%;">
            <a href="/" class="interactive-btn" style="background: rgba(255,255,255,0.02); max-width: 140px; padding: 12px 20px;">
                <span>取消返回</span>
            </a>
            <button type="submit" class="interactive-btn" style="border: none; max-width: 200px; padding: 12px 28px;">
                <span>發表文章</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </form>
</main>
{% endblock %}

{% block extra_js %}
<!-- Quill Library JS -->
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

<!-- Initialize Quill editor -->
<script>
    const quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: '在此撰寫文章內容...',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                ['blockquote', 'code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'clean']
            ]
        }
    });

    // Populate hidden textarea on form submit
    const form = document.getElementById('post-form');
    form.onsubmit = function() {
        const content = document.getElementById('hidden_content');
        // Get html content from Quill editor
        content.value = quill.getSemanticHTML();
        return true;
    };
</script>
{% endblock %}
