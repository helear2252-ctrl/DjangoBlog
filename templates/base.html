{% load static %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium, visually stunning Django Blog built with glassmorphism design.">
    <title>{% block title %}Django Blog{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Ambient Grid & Orbs for depth -->
    <div class="bg-grid"></div>
    <div class="bg-glow-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <!-- Main Wrapper -->
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%; position: relative; z-index: 1; padding: 2rem 0;">
        
        <!-- Header / Logo -->
        {% include "components/header.html" %}

        <!-- Content Area -->
        {% block content %}{% endblock %}

        <!-- Footer -->
        {% include "components/footer.html" %}

    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
